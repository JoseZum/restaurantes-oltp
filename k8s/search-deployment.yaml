# -----------------------------------------------------------
# Deployment: Servicio de Busqueda
# Microservicio Node.js dedicado a consultas de busqueda
# de texto completo. Se comunica con Elasticsearch para
# indexar y consultar datos de restaurantes y menus.
# -----------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: search-service
  namespace: restaurantes-oltp
  labels:
    app.kubernetes.io/name: search-service
    app.kubernetes.io/component: busqueda
    app.kubernetes.io/part-of: restaurantes-oltp
  annotations:
    description: "Microservicio de busqueda de texto completo sobre Elasticsearch"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: search-service
      app.kubernetes.io/component: busqueda
  # Estrategia de actualizacion gradual
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: search-service
        app.kubernetes.io/component: busqueda
        app.kubernetes.io/part-of: restaurantes-oltp
    spec:
      # Contexto de seguridad: ejecutar como usuario no root
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      terminationGracePeriodSeconds: 30
      containers:
        - name: search-service
          # Imagen del microservicio de busqueda publicada en GHCR
          # Reemplazar YOUR_USERNAME con el nombre de usuario real de GitHub
          image: ghcr.io/YOUR_USERNAME/restaurantes-search:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4000
              name: http
              protocol: TCP
          # Variables de entorno desde ConfigMap
          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: restaurantes-config
                  key: NODE_ENV
            - name: ELASTIC_URL
              valueFrom:
                configMapKeyRef:
                  name: restaurantes-config
                  key: ELASTIC_URL
            - name: SEARCH_PORT
              valueFrom:
                configMapKeyRef:
                  name: restaurantes-config
                  key: SEARCH_PORT
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: restaurantes-config
                  key: REDIS_URL
          # Limites y solicitudes de recursos
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          # Sonda de disponibilidad en el puerto del servicio
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          # Sonda de vida: reinicia si el servicio deja de responder
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          # Sonda de inicio: tiempo extra para conexion a Elasticsearch
          startupProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
      # Credenciales para descargar la imagen desde GHCR (si el repositorio es privado)
      # imagePullSecrets:
      #   - name: ghcr-credentials
