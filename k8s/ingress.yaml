# -----------------------------------------------------------
# Ingress: Punto de entrada al sistema OLTP
# Enruta el trafico externo HTTP/HTTPS hacia los servicios
# internos del cluster. Reemplaza la funcion del contenedor
# Nginx del entorno Docker Compose.
#
# Requisitos:
#   - Nginx Ingress Controller instalado en el cluster
#   Instalacion:
#     kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.9.4/deploy/static/provider/cloud/deploy.yaml
# -----------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: restaurantes-ingress
  namespace: restaurantes-oltp
  labels:
    app.kubernetes.io/name: restaurantes-ingress
    app.kubernetes.io/component: balanceador
    app.kubernetes.io/part-of: restaurantes-oltp
  annotations:
    # Clase de Ingress Controller a utilizar
    kubernetes.io/ingress.class: nginx
    # Tiempo maximo de espera para conexiones al backend
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "30"
    # Tamano maximo del cuerpo de las peticiones (para subida de archivos)
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    # Habilitar CORS para clientes frontend
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, PATCH, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Authorization, Content-Type, Accept"
    # Reescribir la URL para que /search/ se mapee a / en el servicio
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  # -----------------------------------------------------------
  # Configuracion TLS (descomentar para habilitar HTTPS)
  # Requiere un Secret con el certificado TLS o cert-manager
  # para emision automatica con Let's Encrypt.
  #
  # Instalacion de cert-manager:
  #   kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.13.3/cert-manager.yaml
  #
  # tls:
  #   - hosts:
  #       - api.restaurantes.example.com
  #     secretName: restaurantes-tls-secret
  # -----------------------------------------------------------
  rules:
    # Reemplazar con el dominio real en produccion
    - host: api.restaurantes.example.com
      http:
        paths:
          # Rutas de busqueda dirigidas al microservicio de busqueda
          - path: /search(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: search-service
                port:
                  number: 4000
          # Todas las demas rutas dirigidas a la API principal
          - path: /
            pathType: Prefix
            backend:
              service:
                name: restaurantes-api
                port:
                  number: 3000
