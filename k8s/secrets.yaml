# -----------------------------------------------------------
# Secret: credenciales y datos sensibles del sistema OLTP
# IMPORTANTE: En produccion, utilizar un gestor de secretos
# externo como HashiCorp Vault, AWS Secrets Manager o
# Sealed Secrets de Bitnami. Los valores aqui son
# placeholders codificados en base64.
#
# Para generar valores reales:
#   echo -n "mi_valor_secreto" | base64
# -----------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: restaurantes-secrets
  namespace: restaurantes-oltp
  labels:
    app.kubernetes.io/name: restaurantes-secrets
    app.kubernetes.io/component: seguridad
    app.kubernetes.io/part-of: restaurantes-oltp
  annotations:
    description: "Credenciales sensibles - reemplazar con valores reales antes del despliegue"
type: Opaque
data:
  # Usuario de PostgreSQL (base64 de "admin_restaurantes")
  DB_USER: YWRtaW5fcmVzdGF1cmFudGVz
  # Contrasena de PostgreSQL (base64 de "CHANGE_ME_IN_PRODUCTION")
  DB_PASS: Q0hBTkdFX01FX0lOX1BST0RVQ1RJT04=
  # Secreto para firma de tokens JWT (base64 de "CHANGE_ME_JWT_SECRET")
  JWT_SECRET: Q0hBTkdFX01FX0pXVF9TRUNSRVQ=
  # URI de conexion a MongoDB - utilizado por el DAO alterno (base64 de "mongodb://localhost:27017/restaurantes")
  MONGO_URI: bW9uZ29kYjovL2xvY2FsaG9zdDoyNzAxNy9yZXN0YXVyYW50ZXM=
