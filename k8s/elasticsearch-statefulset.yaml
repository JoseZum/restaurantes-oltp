# -----------------------------------------------------------
# StatefulSet: Elasticsearch 8.12.1
# Motor de busqueda de texto completo utilizado por el
# microservicio de busqueda. Configurado como nodo unico
# con seguridad deshabilitada para el entorno de desarrollo.
# Se utiliza StatefulSet para mantener datos indexados
# entre reinicios del pod.
# -----------------------------------------------------------
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: elasticsearch
  namespace: restaurantes-oltp
  labels:
    app.kubernetes.io/name: elasticsearch
    app.kubernetes.io/component: motor-busqueda
    app.kubernetes.io/part-of: restaurantes-oltp
    app.kubernetes.io/version: "8.12.1"
spec:
  serviceName: elasticsearch
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: elasticsearch
      app.kubernetes.io/component: motor-busqueda
  template:
    metadata:
      labels:
        app.kubernetes.io/name: elasticsearch
        app.kubernetes.io/component: motor-busqueda
        app.kubernetes.io/part-of: restaurantes-oltp
    spec:
      # Contexto de seguridad: Elasticsearch necesita ejecutarse con UID 1000
      securityContext:
        fsGroup: 1000
      # Contenedor de inicializacion para configurar parametros del kernel
      initContainers:
        - name: sysctl-init
          image: busybox:1.36
          # Aumenta el limite de areas de memoria mapeada requerido por ES
          command:
            - sh
            - -c
            - sysctl -w vm.max_map_count=262144 || true
          securityContext:
            privileged: true
      containers:
        - name: elasticsearch
          image: docker.elastic.co/elasticsearch/elasticsearch:8.12.1
          ports:
            - containerPort: 9200
              name: http
              protocol: TCP
            - containerPort: 9300
              name: transport
              protocol: TCP
          # Variables de entorno para configuracion de nodo unico
          env:
            # Modo de descubrimiento: nodo unico (sin cluster)
            - name: discovery.type
              value: single-node
            # Deshabilitar seguridad de X-Pack para simplificar el acceso interno
            - name: xpack.security.enabled
              value: "false"
            - name: xpack.security.transport.ssl.enabled
              value: "false"
            # Bloqueo de memoria para rendimiento optimo
            - name: bootstrap.memory_lock
              value: "true"
            # Configuracion de memoria JVM para Elasticsearch
            - name: ES_JAVA_OPTS
              value: "-Xms512m -Xmx512m"
            # Nombre del cluster
            - name: cluster.name
              value: restaurantes-search
          # Limites y solicitudes de recursos
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
          # Sonda de disponibilidad: verifica que el cluster este saludable
          readinessProbe:
            httpGet:
              path: /_cluster/health?wait_for_status=yellow&timeout=5s
              port: 9200
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 5
          # Sonda de vida: verifica que ES responda en el endpoint raiz
          livenessProbe:
            httpGet:
              path: /
              port: 9200
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 10
            failureThreshold: 5
          # Sonda de inicio: tiempo extra para la primera carga de indices
          startupProbe:
            httpGet:
              path: /_cluster/health
              port: 9200
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 30
          # Montaje del volumen persistente para datos indexados
          volumeMounts:
            - name: es-data
              mountPath: /usr/share/elasticsearch/data
  # Plantilla de volumen persistente
  volumeClaimTemplates:
    - metadata:
        name: es-data
        labels:
          app.kubernetes.io/name: elasticsearch
          app.kubernetes.io/component: motor-busqueda
          app.kubernetes.io/part-of: restaurantes-oltp
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 20Gi
